name: "\U0001F680 Feature / Enhancement"
description: 새로운 기능 또는 개선 사항을 제안합니다.
title: '[Feature] '
labels:
  - enhancement
body:
  - type: input
    id: problem
    attributes:
      label: 문제/배경
      placeholder: 어떤 문제를 해결하려는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작, UX, API 형태 등을 구체적으로 적어주세요.
      placeholder: 예) 홈 탭에 최근 알림 배지를 표시...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 다른 접근법이나 우회 방법이 있다면 적어주세요.
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위/우선순위
      description: 관련 화면/사용자, 예상 효과, 급한 정도를 적어주세요.
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건 (Definition of Done)
      description: 구현 완료를 판단할 수 있는 기준을 적어주세요.
